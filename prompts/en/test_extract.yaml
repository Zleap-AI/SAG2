              "content": "The theory of relativity revolutionized physics.",
              "category": "Science",
              "keywords": ["theory of relativity", "physics", "revolutionized"],
              "priority": "MEDIUM",
              "status": "COMPLETED",
              "references": [2],
              "entities": [
                {
                  "type": "topic",
                  "name": "the theory of relativity",
