                }
              ],
              "is_valid": true
            },
            {
              "title": "Albert Einstein – developed – the theory of relativity",
              "summary": "Einstein developed the theory of relativity, which later completely revolutionized physics.",
              "content": "He developed the theory of relativity, which revolutionized physics.",
              "category": "Science",
